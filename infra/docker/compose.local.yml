name: ourrag

services:
  backend:
    build:
      context: ../../backend
    env_file:
      - path: ../../.env.example
      - path: ../../.env.docker.example
      - path: ../../.env
        required: false
      - path: ../../.env.local
        required: false
      - path: ../../.env.docker
        required: false
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../../backend/app:/app/app
      - backend_storage:/data/storage
    depends_on:
      - postgres
      - qdrant
      - redis
      - ollama

  frontend:
    build:
      context: ../../frontend
    env_file:
      - path: ../../.env.example
      - path: ../../.env.docker.example
      - path: ../../.env
        required: false
      - path: ../../.env.local
        required: false
      - path: ../../.env.docker
        required: false
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ../../frontend/src:/app/src
      - ../../frontend/index.html:/app/index.html
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ourrag}
      POSTGRES_USER: ${POSTGRES_USER:-ourrag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ourrag}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "127.0.0.1:${QDRANT_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:0.5.7
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  backend_storage:
  frontend_node_modules:
  postgres_data:
  qdrant_data:
  ollama_data:
